name: Lint and Test Charts

on:
  pull_request:
    branches:
    - main

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.11.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      #https://github.com/helm/chart-testing/issues/192
      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --validate-maintainers=false
  
  changes:
    if: ${{ github.actor != 'renovate[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      charts: ${{ steps.changed-charts.outputs.charts }}
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
    - name: Find changed charts
      id: changed-charts
      shell: bash
      run: |
        # Build a JSON matrix of chart directory names changed in this PR, without hardcoding chart names.
        base="${{ github.event.pull_request.base.sha }}"
        head="${{ github.event.pull_request.head.sha }}"

        charts=$(
          git diff --name-only "$base" "$head" -- 'charts/**' |
            awk -F/ 'NF >= 2 { print $2 }' |
            sort -u |
            while read -r chart; do
              if [[ -f "charts/$chart/Chart.yaml" ]]; then
                printf '%s\n' "$chart"
              fi
            done |
            jq -R -s -c 'split("\n") | map(select(length > 0))'
        )

        echo "charts=$charts" >> "$GITHUB_OUTPUT"
  unittest:
    permissions:
      contents: read
    needs: changes
    if: ${{ needs.changes.outputs.charts != '[]' && needs.changes.outputs.charts != '' }}
    strategy:
      matrix: 
          # Parse JSON array containing names of chart directories changed in this PR.
          # e.g. ['jupyter', 'vscode-ai'] if both chart folders contain changes.
        charts: ${{ fromJSON(needs.changes.outputs.charts) }}
    runs-on: ubuntu-latest
    steps:        
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: helm unit test
        run: |
          echo "Changed chart folders:"
          echo "${{ matrix.charts }}"
          helm plugin install https://github.com/helm-unittest/helm-unittest.git
          helm dependency update charts/${{ matrix.charts }}
          helm unittest charts/${{ matrix.charts }} -f ../../tests/*.yaml
